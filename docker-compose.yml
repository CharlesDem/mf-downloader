services:
  minio:
    image: minio/minio:latest
    container_name: mf-minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    env_file:
      - .env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - shared

  mf-downloader:
    image: ghcr.io/charlesdem/mf-downloader:latest
    env_file:
      - .env
    container_name: mf-downloader
    restart: always
    networks:
      - shared
    # extra_hosts:
    #   - "minio.warchd.ovh:172.18.0.2"

  db:
    image: postgres:18
    container_name: mf-db
    env_file:
      - .env
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - pg-vol:/var/lib/postgresql
      - .common/db/init:/docker-entrypoint-initdb.d
    networks:
      - shared

  pgadmin:
    depends_on:
      - db
    image: dpage/pgadmin4
    container_name: pgadmin_gui_avance
    env_file:
      - .env
    ports:
      - "8080:80"
    volumes:
      - pg-vol:/var/lib/pgadmin
    networks:
      - shared

volumes:
  minio_data:
  pg-vol:

networks:
  shared: